plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.askbase"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.example.askbase"
        minSdk 24
        targetSdk flutter.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

tasks.register("copyNobodywhoSo") {
    doLast {
        def soDir = file("${rootProject.projectDir}/../build/nobodywho/jniLibs")
        def destDir = file("${projectDir}/src/main/jniLibs")
        if (soDir.exists()) {
            copy {
                from soDir
                into destDir
            }
            println "Copied nobodywho .so files to jniLibs"
        } else {
            println "WARNING: nobodywho jniLibs dir not found at: ${soDir}"
        }
    }
}

tasks.whenTaskAdded { task ->
    if (task.name == "mergeDebugJniLibFolders" || task.name == "mergeReleaseJniLibFolders") {
        task.dependsOn("copyNobodywhoSo")
    }
}