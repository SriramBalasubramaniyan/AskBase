name: askbase
description: Natural language query interface over any structured SQLite database using an on-device SLM.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # On-device LLM inference
  # flutter_gemma uses Google MediaPipe tasks-genai which ships armeabi-v7a,
  # arm64-v8a AND x86_64 binaries — the only Flutter LLM package that works
  # on 32-bit Android devices. Uses .task model format (MediaPipe-optimized).
  flutter_gemma: ^0.15.0
  flutter_gemma_mediapipe: ^0.15.0

  # Networking (model download)
  dio: ^5.4.3

  # UI
  google_fonts: ^6.4.0
  flutter_markdown: ^0.7.3

  # Utilities
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/agri.db

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
