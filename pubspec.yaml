name: askbase
description: Natural language query interface over any structured SQLite database, powered by an on-device SLM. Fully offline — no API keys, no network calls after setup.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # On-device LLM inference (Qwen2.5-0.5B-Instruct via MediaPipe .task).
  flutter_gemma: ^1.0.0-rc.1
  flutter_gemma_mediapipe: ^1.0.0-rc.1

  # UI
  google_fonts: ^6.3.3
  flutter_markdown: ^0.7.3

  # Utilities
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/agri.db

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
